<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ganymede — Responsive Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
/* Ganymede — warm residential dashboard */
:root {
  /* Warm paper light theme */
  --bg: oklch(0.965 0.012 75);
  --bg-raised: oklch(0.985 0.008 75);
  --bg-sunken: oklch(0.935 0.014 72);
  --ink: oklch(0.22 0.015 60);
  --ink-2: oklch(0.42 0.018 58);
  --ink-3: oklch(0.58 0.018 58);
  --rule: oklch(0.88 0.012 70);
  --rule-2: oklch(0.92 0.010 70);
  --accent: oklch(0.62 0.122 45);
  --accent-ink: oklch(0.98 0.01 75);
  --accent-soft: oklch(0.92 0.035 45);

  --shadow-sm: 0 1px 0 oklch(0 0 0 / 0.03), 0 1px 2px oklch(0 0 0 / 0.04);
  --shadow-md: 0 2px 4px oklch(0 0 0 / 0.04), 0 8px 24px oklch(0 0 0 / 0.06);

  /* Radii */
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  /* Spacing — 4pt base */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-7: 32px;
  --s-8: 40px;
  --s-9: 56px;
  --s-10: 72px;

  /* Typography — fluid but breakpoint-aware via JS device wrapper */
  --font-display: 'Fraunces', 'Iowan Old Style', Georgia, serif;
  --font-sans: 'Inter Tight', 'Söhne', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Consolas, monospace;

  --type-scale: 1;
  --density: 1;
}

[data-theme='dark'] {
  --bg: oklch(0.18 0.012 55);
  --bg-raised: oklch(0.22 0.014 55);
  --bg-sunken: oklch(0.14 0.010 55);
  --ink: oklch(0.96 0.008 75);
  --ink-2: oklch(0.78 0.010 70);
  --ink-3: oklch(0.58 0.014 65);
  --rule: oklch(0.30 0.014 60);
  --rule-2: oklch(0.26 0.012 58);
  --accent: oklch(0.72 0.12 48);
  --accent-ink: oklch(0.16 0.01 55);
  --accent-soft: oklch(0.32 0.05 45);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-sunken);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: 'ss01', 'cv11';
}

/* ---------- App shell (the outer page framing the device) ---------- */
.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
}

.meta-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: oklch(from var(--bg) l c h / 0.82);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  border-bottom: 1px solid var(--rule);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.meta-bar .brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  font-variation-settings: 'opsz' 24, 'SOFT' 50;
}
.mark {
  width: 22px; height: 22px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 65% 35%, oklch(0.92 0.06 78), oklch(0.62 0.10 42) 55%, oklch(0.35 0.06 40) 100%);
  box-shadow: inset -2px -3px 6px oklch(0 0 0 / 0.25), inset 2px 3px 6px oklch(1 0 0 / 0.18);
}
.spacer { flex: 1; }

.seg {
  display: inline-flex;
  padding: 3px;
  background: var(--bg-sunken);
  border: 1px solid var(--rule);
  border-radius: 999px;
  gap: 2px;
}
.seg button {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--ink-2);
  padding: 7px 14px;
  font: 500 12px/1 var(--font-sans);
  letter-spacing: 0.02em;
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.seg button.active {
  background: var(--bg-raised);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.seg button:hover:not(.active) { color: var(--ink); }

.icon-btn {
  appearance: none; border: 1px solid var(--rule);
  background: var(--bg-raised); color: var(--ink);
  width: 34px; height: 34px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.icon-btn:hover { background: var(--bg); }

/* ---------- Device frame ---------- */
.stage {
  padding: 36px 20px 80px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.device {
  --device-radius: 28px;
  background: var(--bg);
  border-radius: var(--device-radius);
  box-shadow: var(--shadow-md), 0 0 0 1px var(--rule);
  overflow: hidden;
  position: relative;
  transition: width 0.35s cubic-bezier(.2,.9,.25,1), max-width 0.35s cubic-bezier(.2,.9,.25,1);
  width: 100%;
  max-width: 1480px;
}
.device[data-bp="desktop"] { max-width: 1480px; aspect-ratio: 16/9; }
.device[data-bp="tablet"]  { max-width: 820px;  aspect-ratio: 3/4; }
.device[data-bp="mobile"]  { max-width: 390px;  aspect-ratio: 19/40; }

.device-inner {
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
}

/* ---------- Dashboard canvas ---------- */
.canvas {
  width: 100%;
  height: 100%;
  background:
    radial-gradient(1200px 700px at 85% -10%, var(--accent-soft), transparent 55%),
    radial-gradient(900px 500px at -10% 110%, oklch(from var(--accent) l c h / 0.08), transparent 60%),
    var(--bg);
  color: var(--ink);
  position: relative;
  overflow: hidden;
  font-size: calc(14px * var(--type-scale));
}

/* Top strip inside dashboard */
.topstrip {
  display: flex;
  align-items: center;
  gap: calc(16px * var(--density));
  padding: calc(18px * var(--density)) calc(28px * var(--density));
  border-bottom: 1px solid var(--rule-2);
}
.topstrip .place {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: calc(15px * var(--type-scale));
  font-variation-settings: 'opsz' 14, 'SOFT' 100;
  color: var(--ink-2);
}
.topstrip .crumb {
  font-family: var(--font-mono);
  font-size: calc(10px * var(--type-scale));
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.topstrip .dot {
  width: 4px; height: 4px; border-radius: 50%; background: var(--ink-3);
}
.topstrip .pill {
  margin-left: auto;
  display: inline-flex; gap: 8px; align-items: center;
  background: var(--bg-raised);
  border: 1px solid var(--rule);
  border-radius: 999px;
  padding: 6px 12px;
  font: 500 calc(11px * var(--type-scale))/1 var(--font-sans);
  color: var(--ink-2);
}
.topstrip .live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: oklch(0.70 0.14 150);
  box-shadow: 0 0 0 3px oklch(from oklch(0.70 0.14 150) l c h / 0.18);
}

/* Grid system — overridden per breakpoint */
.grid {
  display: grid;
  gap: calc(16px * var(--density));
  padding: calc(24px * var(--density)) calc(28px * var(--density));
  height: calc(100% - 58px);
  overflow: auto;
}

.device[data-bp="desktop"] .grid {
  grid-template-columns: repeat(24, 1fr);
  grid-auto-rows: minmax(60px, auto);
  gap: calc(14px * var(--density));
  padding: calc(22px * var(--density)) calc(28px * var(--density));
}
.device[data-bp="tablet"] .grid {
  grid-template-columns: repeat(12, 1fr);
  grid-auto-rows: minmax(56px, auto);
  gap: calc(12px * var(--density));
  padding: calc(20px * var(--density));
}
.device[data-bp="mobile"] .grid {
  grid-template-columns: repeat(8, 1fr);
  grid-auto-rows: auto;
  gap: calc(10px * var(--density));
  padding: calc(14px * var(--density));
  height: auto;
  min-height: calc(100% - 58px);
}
.device[data-bp="mobile"] .clock { min-height: auto; }
.device[data-bp="mobile"] .card { height: auto; }

/* ---------- Card ---------- */
.card {
  background: var(--bg-raised);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: calc(20px * var(--density));
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  overflow: hidden;
}
.card.inset {
  background: var(--bg-sunken);
}
.card.flush { padding: 0; }
.card-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: calc(12px * var(--density));
  gap: 8px;
}
.card-title {
  font-family: var(--font-mono);
  font-size: calc(10px * var(--type-scale));
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.card-sub {
  font: 400 calc(11px * var(--type-scale))/1 var(--font-sans);
  color: var(--ink-3);
}

/* ---------- Clock widget ---------- */
.clock {
  display: flex; flex-direction: column; justify-content: space-between;
  min-height: 100%;
}
.clock .time {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 144, 'SOFT' 30, 'wght' 400;
  font-size: clamp(56px, calc(9vw * var(--type-scale)), 180px);
  line-height: 0.88;
  letter-spacing: -0.035em;
  color: var(--ink);
  font-feature-settings: 'ss01','tnum';
  font-variant-numeric: tabular-nums;
}
.device[data-bp="tablet"] .clock .time { font-size: clamp(64px, 16vw, 140px); }
.device[data-bp="mobile"] .clock .time { font-size: 56px; line-height: 1; }
.clock .time .am {
  font-family: var(--font-sans);
  font-size: 0.26em;
  vertical-align: 0.45em;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  margin-left: 0.08em;
}
.clock .datebar {
  display: flex; justify-content: space-between; align-items: end;
  gap: 16px; flex-wrap: wrap;
  margin-top: calc(12px * var(--density));
}
.clock .long-date {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 18, 'SOFT' 50;
  font-size: calc(18px * var(--type-scale));
  color: var(--ink-2);
}
.clock .sun {
  display: flex; gap: calc(16px * var(--density));
  font: 500 calc(11px * var(--type-scale))/1.2 var(--font-sans);
  color: var(--ink-3);
}
.clock .sun strong {
  color: var(--ink); font-weight: 500; display: block;
  font-family: var(--font-mono);
  font-size: calc(13px * var(--type-scale));
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

/* ---------- Weather ---------- */
.weather .now {
  display: flex; align-items: flex-start; gap: calc(18px * var(--density));
}
.weather .temp {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 144, 'SOFT' 30;
  font-size: calc(76px * var(--type-scale));
  line-height: 0.9;
  letter-spacing: -0.03em;
  font-feature-settings: 'tnum';
}
.weather .temp sup { font-size: 0.34em; vertical-align: top; color: var(--ink-3); margin-left: 2px; }
.weather .summary {
  display: flex; flex-direction: column; gap: 4px; padding-top: 8px;
}
.weather .summary .cond {
  font-family: var(--font-display);
  font-size: calc(18px * var(--type-scale));
  font-variation-settings: 'opsz' 18;
  color: var(--ink);
}
.weather .summary .hi-lo {
  font: 500 calc(12px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3);
  letter-spacing: 0.02em;
}
.weather .hours {
  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
  gap: calc(10px * var(--density));
  margin-top: calc(18px * var(--density));
  border-top: 1px dashed var(--rule);
  padding-top: calc(16px * var(--density));
}
.weather .hour {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--ink-2);
}
.weather .hour .h {
  font: 500 calc(10px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3);
  letter-spacing: 0.04em;
}
.weather .hour .t {
  font-family: var(--font-display);
  font-size: calc(18px * var(--type-scale));
  font-variation-settings: 'opsz' 18;
}
.weather .hour svg { width: 22px; height: 22px; color: var(--accent); }
.weather .forecast-days {
  display: grid; gap: calc(6px * var(--density));
  margin-top: calc(16px * var(--density));
}
.weather .day-row {
  display: grid; grid-template-columns: 64px 24px 1fr auto; gap: 10px;
  align-items: center;
  font-size: calc(13px * var(--type-scale));
  padding: calc(6px * var(--density)) 0;
}
.weather .day-row .d {
  font-weight: 500; color: var(--ink-2); font-size: calc(12px * var(--type-scale));
  font-family: var(--font-mono); letter-spacing: 0.04em;
}
.weather .day-row .bar {
  height: 5px; border-radius: 3px; background: var(--rule);
  position: relative; overflow: hidden;
}
.weather .day-row .bar span {
  position: absolute; top: 0; height: 100%;
  background: linear-gradient(90deg, oklch(0.72 0.10 230), var(--accent));
  border-radius: 3px;
}
.weather .day-row .rng {
  font: 500 calc(11px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3); letter-spacing: 0.02em; white-space: nowrap;
}

/* ---------- Calendar ---------- */
.cal .month {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: calc(12px * var(--density));
}
.cal .month h3 {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 24, 'SOFT' 50;
  font-weight: 400;
  margin: 0;
  font-size: calc(22px * var(--type-scale));
}
.cal .mini {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  font-size: calc(11px * var(--type-scale));
}
.cal .mini .dow {
  font: 500 calc(9px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3); text-align: center; padding: 4px 0 6px;
  letter-spacing: 0.08em;
}
.cal .mini .d {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: var(--ink-2); cursor: pointer;
  font-variant-numeric: tabular-nums;
  font-size: calc(11px * var(--type-scale));
}
.cal .mini .d.off { color: var(--ink-3); opacity: 0.4; }
.cal .mini .d.today {
  background: var(--accent); color: var(--accent-ink); font-weight: 600;
}
.cal .mini .d.has::after {
  content: ''; width: 3px; height: 3px; border-radius: 50%;
  background: var(--accent); position: absolute; margin-top: 22px;
}
.cal .mini .d { position: relative; }
.cal .mini .d:hover:not(.today) { background: var(--bg-sunken); }

.agenda { display: flex; flex-direction: column; gap: calc(2px * var(--density)); margin-top: calc(4px * var(--density)); }
.agenda-day {
  display: grid; grid-template-columns: 42px 1fr; gap: 14px;
  padding: calc(10px * var(--density)) 0;
  border-top: 1px solid var(--rule-2);
  align-items: start;
}
.agenda-day:first-of-type { border-top: 0; }
.agenda-day .dcell {
  text-align: left;
}
.agenda-day .dcell .num {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 36, 'SOFT' 50;
  font-size: calc(28px * var(--type-scale));
  line-height: 1; color: var(--ink);
}
.agenda-day .dcell .dow {
  font: 500 calc(9px * var(--type-scale))/1 var(--font-mono);
  letter-spacing: 0.14em; color: var(--ink-3);
  text-transform: uppercase;
  margin-top: 4px;
}
.agenda-day.today .dcell .num { color: var(--accent); }
.agenda-day .evts { display: flex; flex-direction: column; gap: calc(6px * var(--density)); min-width: 0; }
.evt {
  display: grid; grid-template-columns: 8px 58px 1fr; gap: 10px; align-items: center;
  padding: calc(6px * var(--density)) 0; min-width: 0;
}
.evt .bar { width: 3px; height: 100%; min-height: 18px; border-radius: 3px; background: var(--accent); }
.evt .bar.c2 { background: oklch(0.62 0.09 180); }
.evt .bar.c3 { background: oklch(0.55 0.08 280); }
.evt .bar.c4 { background: oklch(0.62 0.08 130); }
.evt .time {
  font: 500 calc(11px * var(--type-scale))/1.3 var(--font-mono);
  color: var(--ink-3); letter-spacing: 0.02em;
}
.evt .title {
  font-size: calc(13px * var(--type-scale)); color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ---------- Photos ---------- */
.photos {
  padding: 0;
  overflow: hidden;
  position: relative;
  min-height: 220px;
}
.photo-frame {
  position: absolute; inset: 0;
  transition: opacity 0.8s ease;
}
.photo-frame.out { opacity: 0; }
.photo-caption {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: calc(18px * var(--density)) calc(20px * var(--density));
  background: linear-gradient(180deg, transparent, oklch(0 0 0 / 0.55));
  color: #fff;
  display: flex; justify-content: space-between; align-items: end; gap: 14px;
}
.photo-caption .title {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 24, 'SOFT' 100;
  font-size: calc(18px * var(--type-scale));
}
.photo-caption .meta {
  font-family: var(--font-mono);
  font-size: calc(10px * var(--type-scale));
  letter-spacing: 0.1em; text-transform: uppercase;
  opacity: 0.85;
}
.photo-dots {
  position: absolute; top: 14px; right: 14px;
  display: flex; gap: 4px;
}
.photo-dots i {
  width: 5px; height: 5px; border-radius: 50%;
  background: oklch(1 0 0 / 0.5);
}
.photo-dots i.on { background: #fff; }

/* ---------- News ---------- */
.news .lede {
  display: flex; flex-direction: column; gap: 6px;
  padding-bottom: calc(12px * var(--density));
  border-bottom: 1px solid var(--rule-2);
  margin-bottom: calc(10px * var(--density));
}
.news .lede .tag {
  font: 500 calc(9px * var(--type-scale))/1 var(--font-mono);
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent);
}
.news .lede h4 {
  margin: 0;
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 24, 'SOFT' 30;
  font-weight: 400;
  font-size: calc(18px * var(--type-scale));
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-wrap: pretty;
}
.news .lede p {
  margin: 0; font-size: calc(12px * var(--type-scale)); color: var(--ink-2); line-height: 1.5;
}
.news ul {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column;
}
.news li {
  display: grid; grid-template-columns: 56px 1fr; gap: 12px;
  padding: calc(8px * var(--density)) 0;
  border-top: 1px solid var(--rule-2);
  align-items: start;
}
.news li:first-child { border-top: 0; }
.news li .src {
  font: 500 calc(9px * var(--type-scale))/1.2 var(--font-mono);
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3);
  padding-top: 2px;
}
.news li .h {
  font-size: calc(13px * var(--type-scale)); color: var(--ink); line-height: 1.35;
  text-wrap: pretty;
}

/* ---------- Tasks ---------- */
.tasks ul { list-style: none; padding: 0; margin: 0; }
.tasks li {
  display: grid; grid-template-columns: 22px 1fr auto; gap: 12px; align-items: center;
  padding: calc(10px * var(--density)) 0;
  border-top: 1px solid var(--rule-2);
  cursor: pointer;
}
.tasks li:first-child { border-top: 0; }
.tasks .box {
  width: 18px; height: 18px; border-radius: 6px;
  border: 1.5px solid var(--ink-3); display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.tasks .box svg { opacity: 0; transform: scale(0.6); transition: all 0.15s ease; }
.tasks li.done .box {
  background: var(--accent); border-color: var(--accent);
}
.tasks li.done .box svg { opacity: 1; transform: scale(1); color: var(--accent-ink); }
.tasks li.done .label { color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-3); }
.tasks .label { font-size: calc(13px * var(--type-scale)); color: var(--ink); }
.tasks .meta {
  font: 500 calc(10px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3); letter-spacing: 0.04em;
}
.tasks .progress {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: calc(10px * var(--density));
  padding-top: calc(10px * var(--density));
  border-top: 1px dashed var(--rule);
}
.tasks .progress .bar { flex: 1; height: 4px; background: var(--rule); border-radius: 2px; margin: 0 12px; overflow: hidden; }
.tasks .progress .bar span { display: block; height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
.tasks .progress .count { font: 500 calc(11px * var(--type-scale))/1 var(--font-mono); color: var(--ink-2); }

/* ---------- Home ---------- */
.home-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: calc(10px * var(--density));
}
.home-tile {
  display: flex; flex-direction: column; gap: 6px;
  padding: calc(12px * var(--density));
  border: 1px solid var(--rule);
  border-radius: var(--r-md);
  background: var(--bg);
  cursor: pointer;
  transition: all 0.15s ease;
}
.home-tile:hover { border-color: var(--ink-3); }
.home-tile.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.home-tile.on .row { color: var(--accent-ink); opacity: 0.9; }
.home-tile .icon {
  width: 22px; height: 22px; color: var(--ink-2);
}
.home-tile.on .icon { color: var(--accent-ink); }
.home-tile .name {
  font-size: calc(12px * var(--type-scale)); font-weight: 500;
}
.home-tile .row {
  font: 500 calc(10px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3); letter-spacing: 0.04em;
  display: flex; justify-content: space-between;
}
.home-tile .state {
  font-family: var(--font-display);
  font-size: calc(16px * var(--type-scale));
  font-variation-settings: 'opsz' 18;
}

/* ---------- Commute ---------- */
.commute .route {
  display: grid; grid-template-columns: 1fr auto; gap: 12px;
  align-items: center;
  padding: calc(10px * var(--density)) 0;
  border-top: 1px solid var(--rule-2);
}
.commute .route:first-of-type { border-top: 0; }
.commute .line { display: flex; flex-direction: column; gap: 4px; }
.commute .name { font-size: calc(13px * var(--type-scale)); color: var(--ink); }
.commute .sub {
  font: 500 calc(10px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3); letter-spacing: 0.04em;
}
.commute .mins {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 24;
  font-size: calc(22px * var(--type-scale));
  color: var(--ink);
  font-feature-settings: 'tnum';
}
.commute .mins .unit {
  font-family: var(--font-mono);
  font-size: calc(10px * var(--type-scale));
  color: var(--ink-3);
  margin-left: 2px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.commute .mins.bad { color: oklch(0.55 0.14 28); }
.commute .mins.ok  { color: oklch(0.55 0.10 150); }

/* ---------- Stocks ---------- */
.stocks table { width: 100%; border-collapse: collapse; }
.stocks th {
  text-align: left;
  font: 500 calc(9px * var(--type-scale))/1 var(--font-mono);
  color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0 0 calc(8px * var(--density)); font-weight: 500;
}
.stocks th:last-child, .stocks td:last-child { text-align: right; }
.stocks td {
  padding: calc(8px * var(--density)) 0;
  border-top: 1px solid var(--rule-2);
  font-size: calc(12px * var(--type-scale));
}
.stocks .sym { font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.02em; }
.stocks .price { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.stocks .chg.up { color: oklch(0.55 0.10 150); }
.stocks .chg.dn { color: oklch(0.55 0.14 28); }
.stocks .spark { width: 48px; height: 18px; vertical-align: middle; }

/* ---------- Quote ---------- */
.quote-card {
  background: linear-gradient(135deg, var(--accent-soft), oklch(from var(--accent) l c h / 0.04));
}
.quote-card .q {
  font-family: var(--font-display);
  font-variation-settings: 'opsz' 72, 'SOFT' 100;
  font-weight: 400;
  font-style: italic;
  font-size: calc(22px * var(--type-scale));
  line-height: 1.25;
  color: var(--ink);
  letter-spacing: -0.01em;
  text-wrap: balance;
}
.quote-card .a {
  margin-top: calc(12px * var(--density));
  font: 500 calc(10px * var(--type-scale))/1 var(--font-mono);
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3);
}

/* ---------- Tweaks panel ---------- */
.tweaks {
  position: fixed;
  right: 20px; bottom: 20px;
  width: 320px;
  max-height: calc(100vh - 40px);
  background: var(--bg-raised);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
  z-index: 100;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.tweaks.hidden { display: none; }
.tweaks header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--rule);
}
.tweaks header h3 {
  margin: 0; font-family: var(--font-display);
  font-size: 16px; font-weight: 500;
  font-variation-settings: 'opsz' 18, 'SOFT' 50;
}
.tweaks .body { padding: 12px 16px; overflow: auto; display: flex; flex-direction: column; gap: 14px; }
.tweak-row { display: flex; flex-direction: column; gap: 8px; }
.tweak-row > label {
  font: 500 10px/1 var(--font-mono);
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3);
}
.tweak-row .choices { display: flex; flex-wrap: wrap; gap: 4px; }
.tweak-chip {
  appearance: none; border: 1px solid var(--rule); background: var(--bg);
  color: var(--ink-2); padding: 6px 10px; border-radius: 999px;
  font: 500 11px/1 var(--font-sans); cursor: pointer;
}
.tweak-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.tweak-row .grid-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.tweak-check {
  appearance: none; border: 1px solid var(--rule); background: var(--bg);
  color: var(--ink-2); padding: 6px 8px; border-radius: 8px;
  font: 500 11px/1 var(--font-sans); cursor: pointer; text-align: left;
}
.tweak-check.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.tweaks input[type="range"] {
  width: 100%; accent-color: var(--accent);
}

/* ---------- Guidance panel (below device) ---------- */
.guidance {
  max-width: 1480px;
  margin: 40px auto 0;
  padding: 0 20px 80px;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 20px;
}
.guide-head {
  grid-column: 1 / -1;

  padding-bottom: 16px;
  border-bottom: 1px solid var(--rule);
  gap: 20px; flex-wrap: wrap;

.guide-head h2 {

.guide-head p {
  margin: 0; max-width: 44ch;

  text-wrap: pretty;
}
.guide-card {
  grid-column: span 4;
  background: var(--bg-raised);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.guide-card.wide { grid-column: span 6; }
.guide-card.full { grid-column: 1 / -1; }
.guide-card .label {
  font: 500 10px/1 var(--font-mono);
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3);
}
.guide-card h3 {
  margin: 0;

  font-size: 20px;
  letter-spacing: -0.01em;

.guide-card p { margin: 0; color: var(--ink-2); font-size: 13px; line-height: 1.55; text-wrap: pretty; }
.guide-card ul {
  margin: 0; padding: 0; list-style: none;
  display: flex; flex-direction: column; gap: 8px;
}
.guide-card li {
  display: grid; grid-template-columns: 18px 1fr; gap: 10px;
  font-size: 13px; color: var(--ink-2); line-height: 1.5;
}
.guide-card li::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  margin-top: 7px;
}
.guide-card li > span { display: block; }
.guide-card li strong { color: var(--ink); font-weight: 500; }

/* Breakpoint overview diagram */
.bp-diagram {
  display: grid; grid-template-columns: 6fr 3fr 1.5fr;
  gap: 14px;
  padding: 16px;
  background: var(--bg-sunken);
  border: 1px solid var(--rule-2);
  border-radius: var(--r-md);
}
.bp-diagram .bp-box {
  border: 1px dashed var(--rule);
  border-radius: var(--r-sm);
  background: var(--bg);
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 200px;
}
.bp-diagram .bp-box .lbl {
  font: 500 10px/1 var(--font-mono);
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3);
  display: flex; justify-content: space-between;
}
.bp-diagram .bp-box .lbl strong { color: var(--ink); font-weight: 500; }
.bp-diagram .cells {
  display: grid; gap: 4px; flex: 1;
}
.bp-diagram .cell {
  background: var(--accent-soft);
  border-radius: 4px;
  font: 500 9px/1 var(--font-mono);
  color: var(--ink-2);
  padding: 6px;
  display: flex; align-items: end;
  min-height: 24px;
}
.bp-diagram .cell.accent { background: var(--accent); color: var(--accent-ink); }
.bp-diagram .desktop .cells {
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
}
.bp-diagram .tablet .cells {
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(5, 1fr);
}
.bp-diagram .mobile .cells {
  grid-template-columns: 1fr;
  grid-auto-rows: minmax(18px, 1fr);
}

.swatch-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch {
  border-radius: var(--r-sm); height: 56px;
  border: 1px solid var(--rule);
  display: flex; flex-direction: column; justify-content: end;
  padding: 6px 8px;
  font: 500 9px/1 var(--font-mono);
  letter-spacing: 0.06em;
}
.swatch small { display: block; opacity: 0.7; margin-top: 2px; font-size: 8px; }

/* Type specimen */
.type-spec { display: flex; flex-direction: column; gap: 14px; }
.type-spec .row { display: grid; grid-template-columns: 100px 1fr; gap: 16px; align-items: baseline; }
.type-spec .row .meta {
  font: 500 10px/1 var(--font-mono);
  letter-spacing: 0.08em; color: var(--ink-3);
}
.type-spec .spec-h1 {
  font-family: var(--font-display); font-variation-settings: 'opsz' 72, 'SOFT' 30;
  font-size: 44px; line-height: 1; letter-spacing: -0.03em;
}
.type-spec .spec-h2 {
  font-family: var(--font-display); font-variation-settings: 'opsz' 24, 'SOFT' 50;
  font-size: 24px; line-height: 1.1; letter-spacing: -0.01em;
}
.type-spec .spec-body { font-size: 14px; line-height: 1.55; color: var(--ink-2); }
.type-spec .spec-mono {
  font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.04em; color: var(--ink);
}

/* Scrollbar polish */
.grid::-webkit-scrollbar, .tweaks .body::-webkit-scrollbar { width: 8px; height: 8px; }
.grid::-webkit-scrollbar-thumb, .tweaks .body::-webkit-scrollbar-thumb {
  background: var(--rule); border-radius: 4px;
}
.grid::-webkit-scrollbar-track { background: transparent; }

/* Small screens — keep chrome sensible */
@media (max-width: 900px) {
  .meta-bar { padding: 12px; gap: 12px; }
  .meta-bar .brand { font-size: 18px; }
  .stage { padding: 18px 10px 60px; }
  .guidance { grid-template-columns: repeat(6, 1fr); }
  .guide-card, .guide-card.wide { grid-column: span 6; }
  .bp-diagram { grid-template-columns: 1fr; }
  .bp-diagram .bp-box { min-height: 160px; }
}

function useTicker() {
  const [, tick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => tick(n => n + 1), 15_000);
    return () => clearInterval(t);
  }, []);
}

const ClockWidget = ({ clock24 }) => {
  useTicker();
  // Use real now so it stays live, but fall back to the mock day-of-week/date display
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const h12 = ((h + 11) % 12) + 1;
  const isPM = h >= 12;
  const mm = String(m).padStart(2, '0');
  const hh = clock24 ? String(h).padStart(2, '0') : String(h12);
  const longDate = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
  return (
    <div className="clock">
      <div>
        <div className="time">
          {hh}<span style={{opacity: 0.45}}>:</span>{mm}
          {!clock24 && <span className="am">{isPM ? 'PM' : 'AM'}</span>}
        </div>
      </div>
      <div className="datebar">
        <div className="long-date">{longDate}</div>
        <div className="sun">
          <div><strong>{D.sun.rise}</strong>Sunrise</div>
          <div><strong>{D.sun.set}</strong>Sunset</div>
        </div>
      </div>
    </div>
  );
};

const PhotosWidget = ({ wallpaper }) => {
  const [idx, setIdx] = useState(0);
  const [fading, setFading] = useState(false);
  const list = useMemo(() => {
    if (wallpaper === 'all') return D.photos;
    const picked = D.photos.find(p => p.title.toLowerCase().includes(wallpaper));
    return picked ? [picked, ...D.photos.filter(p => p !== picked)] : D.photos;
  }, [wallpaper]);
  useEffect(() => {
    const t = setInterval(() => {
      setFading(true);
      setTimeout(() => {
        setIdx(i => (i + 1) % list.length);
        setFading(false);
      }, 600);
    }, 6500);
    return () => clearInterval(t);
  }, [list.length]);

  const p = list[idx];
  return (
    <div className="card flush photos">
      <div className={'photo-frame' + (fading ? ' out' : '')} key={p.title}>
        <PhotoCanvas p={p}/>
      </div>
      <div className="photo-dots">
        {list.map((_, i) => <i key={i} className={i === idx ? 'on' : ''}/>)}
      </div>
      <div className="photo-caption">
        <div>
          <div className="title">{p.title}</div>
          <div className="meta">{p.meta}</div>
        </div>
        <div className="meta">{idx + 1} / {list.length}</div>
      </div>
    </div>
  );
};

const Spark = ({ data, up }) => {
  const w = 48, h = 18;
  const min = Math.min(...data), max = Math.max(...data);
  const rng = Math.max(1, max - min);
  const pts = data.map((v, i) => `${(i/(data.length-1))*w},${h - ((v-min)/rng)*h}`).join(' ');
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`}>
      <polyline fill="none" stroke={up ? 'oklch(0.55 0.10 150)' : 'oklch(0.55 0.14 28)'} strokeWidth="1.25" points={pts}/>
    </svg>
  );
};

  <script type="text/babel">

// ---------------------------------------------------------------------------
// Layout — per-breakpoint grid placements

  desktop: {
    clock:    { col: '1 / span 14', row: '1 / span 3' },

  return (

          <label>Density</label>
          <div className="choices">
            {['cozy','comfortable','roomy'].map(v => (
              <button key={v} className={'tweak-chip' + (tweaks.density === v ? ' active' : '')} onClick={() => update({density: v})}>{v}</button>
            ))}

            ))}
          </div>
        </div>
        <div className="tweak-row">
          <label>Clock format</label>
          <div className="choices">
            <button className={'tweak-chip' + (!tweaks.clock24 ? ' active' : '')} onClick={() => update({clock24: false})}>12-hour</button>
            <button className={'tweak-chip' + (tweaks.clock24 ? ' active' : '')} onClick={() => update({clock24: true})}>24-hour</button>
          </div>
        </div>
        <div className="tweak-row">
          <label>Wallpaper source</label>
          <div className="choices">
            {['all','harbor','kitchen','porch','snow'].map(v => (
              <button key={v} className={'tweak-chip' + (tweaks.wallpaper === v ? ' active' : '')} onClick={() => update({wallpaper: v})}>{v}</button>

// ---------------------------------------------------------------------------
// App shell
// ---------------------------------------------------------------------------
const App = () => {
  const [bp, setBp] = useState(() => localStorage.getItem('ganymede-bp') || 'desktop');
  const [tweaks, setTweaks] = useState(() => {
    const stored = localStorage.getItem('ganymede-tweaks');
    if (stored) { try { return {...TWEAK_DEFAULTS, ...JSON.parse(stored)}; } catch (e) {} }
    return TWEAK_DEFAULTS;
  });
  const [panelOpen, setPanelOpen] = useState(false);

  useEffect(() => { localStorage.setItem('ganymede-bp', bp); }, [bp]);
  useEffect(() => { localStorage.setItem('ganymede-tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  // Resolve theme (auto = prefers-color-scheme)
  useEffect(() => {
    const root = document.documentElement;
    const apply = () => {
      if (tweaks.theme === 'auto') {
        root.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      } else {
        root.dataset.theme = tweaks.theme;
      }
    };
    apply();
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    mq.addEventListener('change', apply);
    return () => mq.removeEventListener('change', apply);
  }, [tweaks.theme]);

  // Type scale + density CSS vars
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--type-scale', SCALE_MAP[tweaks.typeScale] ?? 1);
    root.style.setProperty('--density',     DENSITY_MAP[tweaks.density]   ?? 1);
  }, [tweaks.typeScale, tweaks.density]);

  // Edit-mode host integration
  useEffect(() => {
    const handler = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode')   setPanelOpen(true);
      if (d.type === '__deactivate_edit_mode') setPanelOpen(false);
    };
    window.addEventListener('message', handler);
    try { window.parent?.postMessage({type: '__edit_mode_available'}, '*'); } catch (e) {}
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div className="app-shell">
      <div className="meta-bar">
        <div className="brand"><span className="mark"/>Ganymede</div>
        <div className="seg" role="tablist" aria-label="Breakpoint">
          {[
            { id: 'desktop', label: '1920 · Wall', icon: 'desktop' },
            { id: 'tablet',  label: '820 · Tablet', icon: 'tablet' },
            { id: 'mobile',  label: '390 · Phone', icon: 'mobile' },
          ].map(b => (
            <button key={b.id} className={bp === b.id ? 'active' : ''} onClick={() => setBp(b.id)}>
              <Icon name={b.icon} size={14}/>{b.label}
            </button>
          ))}
        </div>
        <div className="spacer"/>
        <button className="icon-btn" onClick={() => setPanelOpen(v => !v)} title="Tweaks"><Icon name="settings" size={15}/></button>
      </div>

      <div className="stage">
        <div className="device" data-bp={bp} data-screen-label={`${bp} device`}>
          <div className="device-inner">
            <Dashboard bp={bp} tweaks={tweaks}/>
          </div>
        </div>
      </div>

      <Guidance/>

      <TweaksPanel open={panelOpen} tweaks={tweaks} setTweaks={setTweaks} onClose={() => setPanelOpen(false)}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

  </script>
